name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Write wifi_config.h from secrets
        run: |
          cat > wifi_config.h <<EOF
          #pragma once
          #define WIFI_SSID     "${{ secrets.WIFI_SSID }}"
          #define WIFI_PASSWORD "${{ secrets.WIFI_PASSWORD }}"
          #define MQTT_HOST     "${{ secrets.MQTT_HOST }}"
          #define MQTT_PORT     ${{ secrets.MQTT_PORT }}
          #define MQTT_USER     "${{ secrets.MQTT_USER }}"
          #define MQTT_PASSWORD "${{ secrets.MQTT_PASSWORD }}"
          #define MQTT_TOPIC_PREFIX "claude-desktop-buddy"
          EOF

      - name: Install PlatformIO and esptool
        run: pip install platformio==6.1.19 esptool

      - name: Build firmware
        run: pio run -e m5stick-s3

      - name: Build LittleFS image
        if: hashFiles('data/**') != ''
        run: pio run -e m5stick-s3 -t buildfs

      - name: Use OPI PSRAM bootloader
        run: |
          echo "=== Default bootloader SHA256 ==="
          sha256sum .pio/build/m5stick-s3/bootloader.bin
          echo "=== All bootloaders in framework ==="
          find "${HOME}/.platformio/packages/framework-arduinoespressif32" -name "bootloader*.bin" | sort
          echo "=== esp32s3 SDK directory contents ==="
          find "${HOME}/.platformio/packages/framework-arduinoespressif32/tools/sdk" -maxdepth 3 -type d | sort
          echo "=== Looking for any OPI-related files ==="
          find "${HOME}/.platformio/packages/framework-arduinoespressif32" -iname "*opi*" | sort
          OPI_BOOTLOADER=$(find "${HOME}/.platformio/packages/framework-arduinoespressif32" \( -path "*esp32s3*opi*bootloader*.bin" -o -path "*esp32s3*bootloader*opi*.bin" \) 2>/dev/null | head -1)
          if [ -z "${OPI_BOOTLOADER}" ]; then
            echo "WARNING: No OPI bootloader found — leaving default bootloader in place"
          else
            echo "=== Using OPI bootloader: ${OPI_BOOTLOADER} ==="
            sha256sum "${OPI_BOOTLOADER}"
            cp "${OPI_BOOTLOADER}" .pio/build/m5stick-s3/bootloader.bin
            echo "=== Bootloader replaced ==="
          fi

      - name: Merge firmware into single flashable binary
        run: |
          python3 -m esptool --chip esp32s3 merge_bin \
            -o merged-firmware.bin \
            --flash_mode qio \
            --flash_size 8MB \
            0x0    .pio/build/m5stick-s3/bootloader.bin \
            0x8000 .pio/build/m5stick-s3/partitions.bin \
            0x10000 .pio/build/m5stick-s3/firmware.bin

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Stage release assets
        run: |
          mkdir -p release
          cp merged-firmware.bin                       release/merged-firmware.bin
          cp .pio/build/m5stick-s3/firmware.bin        release/firmware.bin
          cp .pio/build/m5stick-s3/bootloader.bin      release/bootloader.bin
          cp .pio/build/m5stick-s3/partitions.bin      release/partitions.bin

      - name: Stage LittleFS image
        if: hashFiles('data/**') != ''
        run: cp .pio/build/m5stick-s3/littlefs.bin release/littlefs.bin

      - name: Generate manifest.json
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          REPO="https://github.com/${{ github.repository }}"
          cat > release/manifest.json <<EOF
          {
            "name": "Claude Desktop Buddy S3",
            "version": "${VERSION}",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  {
                    "path": "${REPO}/releases/download/${VERSION}/merged-firmware.bin",
                    "offset": 0
                  }
                ]
              }
            ]
          }
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/merged-firmware.bin
            release/firmware.bin
            release/bootloader.bin
            release/partitions.bin
            release/manifest.json
            release/littlefs.bin
